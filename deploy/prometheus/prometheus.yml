global:
  scrape_interval: 10s
  evaluation_interval: 10s

remote_write:
  - url: http://victoriametrics:8428/api/v1/write
    queue_config:
      capacity: 20000
      min_shards: 1
      max_shards: 30
      max_samples_per_send: 5000
      batch_send_deadline: 5s

scrape_configs:
  - job_name: senec-collector
    static_configs:
      - targets:
          - collector:9464

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
