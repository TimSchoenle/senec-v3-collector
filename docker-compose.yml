services:
  collector:
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    image: senec-v3-collector:local
    environment:
      SENEC_BASE_URL: ${SENEC_BASE_URL:-https://192.168.178.36}
      SENEC_POST_PATH: ${SENEC_POST_PATH:-/lala.cgi}
      SENEC_TIMEOUT_SECS: ${SENEC_TIMEOUT_SECS:-10}
      SENEC_INSECURE_TLS: ${SENEC_INSECURE_TLS:-true}
      SENEC_CHUNK_SIZE: ${SENEC_CHUNK_SIZE:-20}
      SENEC_POLL_INTERVAL_SECS: ${SENEC_POLL_INTERVAL_SECS:-10}
      SENEC_PROFILE_PATH: ${SENEC_PROFILE_PATH:-profiles/generated/senec-profile-live.json}
      SENEC_SITE_ID: ${SENEC_SITE_ID:-local}
      SENEC_GRID_IMPORT_PRICE_EUR_PER_KWH: ${SENEC_GRID_IMPORT_PRICE_EUR_PER_KWH:-0.35}
      SENEC_GRID_EXPORT_PRICE_EUR_PER_KWH: ${SENEC_GRID_EXPORT_PRICE_EUR_PER_KWH:-0.08}
      SENEC_ECONOMICS_STATE_PATH: ${SENEC_ECONOMICS_STATE_PATH:-/app/state/grid-economics-state.json}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./profiles/generated:/app/profiles/generated
      - collector-state:/app/state
    restart: unless-stopped
    ports:
      - ${COLLECTOR_PORT:-9464}:9464
    networks:
      - senec

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-45d}
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - ${PROMETHEUS_PORT:-9090}:9090
    depends_on:
      - collector
      - victoriametrics
    restart: unless-stopped
    networks:
      - senec

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.140.0
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=${VICTORIAMETRICS_RETENTION:-5y}
    volumes:
      - victoriametrics-data:/storage
    ports:
      - ${VICTORIAMETRICS_PORT:-8428}:8428
    restart: unless-stopped
    networks:
      - senec

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - ${GRAFANA_PORT:-3000}:3000
    depends_on:
      - prometheus
      - victoriametrics
    restart: unless-stopped
    networks:
      - senec

volumes:
  collector-state:
  prometheus-data:
  victoriametrics-data:
  grafana-data:

networks:
  senec:
